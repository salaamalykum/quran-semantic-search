<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <script>
    // Redirect to PC if desktop (width > 900) and not already on PC
    if (!/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) && window.innerWidth > 900) {
      if (window.location.href.indexOf("/pc/") === -1) {
        window.location.href = "../pc/index.html";
      }
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>古兰经中文翻译｜古兰经中文版本｜古兰经中文</title>
  <link rel="sitemap" type="application/xml" title="Sitemap" href="../sitemap.xml">
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" href="./assets/icons/logo.svg" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="btn-drawer" class="icon-btn" aria-label="打开章节导航">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
        </svg>
      </button>
      <div class="brand">古兰经</div>
      <div class="search-wrap">
        <input id="q" type="search" placeholder="搜索..." />
        <button id="go" class="btn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path
              d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
          </svg>
        </button>
      </div>
      <button id="btn-theme" class="icon-btn" title="切换模式">
        🌙
      </button>
    </header>

    <div id="drawer" class="drawer" aria-hidden="true">
      <div class="drawer-header">
        <strong>章节导航</strong>
        <button id="btn-close" class="icon-btn">✕</button>
      </div>
      <div id="sura-list" class="sura-list"></div>
    </div>

    <main class="content">
      <section class="controls">
        <div class="filters">
          <!-- Labels will be styled to look better -->
          <label class="filter-item"><input type="checkbox" data-key="mazhonggang" checked /> 马仲刚</label>
          <label class="filter-item"><input type="checkbox" data-key="majinpeng" checked /> 马金鹏</label>
          <label class="filter-item"><input type="checkbox" data-key="tongdaozhang" checked /> 仝道章</label>
          <label class="filter-item"><input type="checkbox" data-key="wangjingzhai" checked /> 王静斋</label>
          <label class="filter-item"><input type="checkbox" data-key="majian" checked /> 马坚</label>
        </div>
      </section>

      <div id="loading" class="loading" hidden>
        <div class="spinner"></div> 加载中…
      </div>
      <div id="results" class="results"></div>
      <div id="noresults" class="no-results" hidden>
        <p>未找到相关结果</p>
      </div>
    </main>
  </div>

  <!-- Data Loaders (External) -->
  <script src="./sura-names.js"></script>
  <script src="./data/mazhonggang.data.js"></script>
  <script src="./data/majinpeng.data.js"></script>
  <script src="./data/tongdaozhang.data.js"></script>
  <script src="./data/wangjingzhai.data.js"></script>
  <script src="./data/majian.data.js"></script>

  <script src="./app.js"></script>
</body>

</html>
