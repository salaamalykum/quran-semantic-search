name: GEO & LLM Indexing Ping
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0' # Ensure a fresh ping every week

jobs:
  ping_search_engines:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Google Index
        run: |
          curl -sS "https://www.google.com/ping?sitemap=https://salaamalykum.com/cn/qurancn/pc/sitemap.xml"
      - name: Ping Bing (which feeds OpenAI/ChatGPT indexing)
        run: |
          curl -sS "https://www.bing.com/ping?sitemap=https://salaamalykum.com/cn/qurancn/pc/sitemap.xml"
      - name: GEO Signal Log
        run: |
          echo "Successfully notified global crawlers of latest RAG and translation alignments."
