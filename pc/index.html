<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <script>
    // Device Detection & Redirection
    if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768) {
      // Prevent redirect loop if already on mobile (though this is the PC page)
      if (window.location.href.indexOf("mobile") === -1) {
        window.location.href = "../mobile/index.html";
      }
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>古兰经中文翻译｜古兰经中文在线｜古兰经中文翻译搜索工具</title>
  <link rel="sitemap" type="application/xml" title="Sitemap" href="../sitemap.xml">
  <link rel="stylesheet" href="assets/styles.css">

  <!-- SEO & Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "BreadcrumbList",
          "itemListElement": [{
            "@type": "ListItem",
            "position": 1,
            "name": "首页",
            "item": "https://salaamalykum.com/cn/"
          },{
            "@type": "ListItem",
            "position": 2,
            "name": "古兰经中文",
            "item": "https://salaamalykum.com/cn/qurancn/pc/"
          }]
        },
        {
          "@type": "SoftwareApplication",
          "name": "古兰经中文翻译搜索工具 PC版",
          "alternateName": "Quran CN Search Offline PC",
          "applicationCategory": "ReferenceApplication",
          "operatingSystem": "Web Browser",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "CNY" },
          "description": "专业的古兰经全文检索工具，包含114章完整经文与5个中文翻译版本。支持多关键词布尔搜索、正则表达式匹配以及离线阅读功能。",
          "author": { "@type": "Organization", "name": "Salaam Alykum" }
        }
      ]
    }
  </script>
</head>

<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <a class="logo" href="#">
          <span class="mark"><img src="assets/icons/logo.png" alt="Logo" width="24" height="24"></span>
          <span class="brand">古兰经中文翻译搜索工具</span>
        </a>
        <div class="searchbar">
          <input id="q" type="text" placeholder="搜索关键词（支持多关键词：用空格分隔；或开启正则表达式）">
          <button id="go" class="button">搜索</button>
        </div>
        <button id="btn-theme" class="button"
          style="background:transparent; border-color:var(--border); color:var(--ink); box-shadow:none; padding:12px;"
          title="切换日间/夜间模式">
          🌗
        </button>
      </div>

      <div class="filters">
        <div class="group" id="filter-translators" title="按译者筛选">
          <!-- Checkboxes generated by JS -->
        </div>
        <div class="group">
          <label class="toggle-label"><input type="checkbox" id="regex"> <span>正则表达式</span></label>
        </div>
        <div class="group info-tip" title="提示">
          <span>提示：多关键词为空格分隔（“且”逻辑）。</span>
        </div>
      </div>
    </header>

    <aside class="sidebar">
      <ul class="slist" aria-label="章节导航"></ul>
    </aside>

    <main class="main">
      <div class="result-header">
        <h2 id="mode-title">请选择章节或进行搜索</h2>
      </div>
      <div class="results"></div>
    </main>
  </div>

  <div class="loading">
    <div class="spinner">加载中…</div>
  </div>

  <!-- Data Scripts (Offline Compatible) -->
  <script src="sura-names.js"></script>

  <!-- Translator Data: 5 Versions -->
  <script src="data/majian.data.js"></script>
  <script src="data/mazhonggang.data.js"></script>
  <script src="data/majinpeng.data.js"></script>
  <script src="data/tongdaozhang.data.js"></script>
  <script src="data/wangjingzhai.data.js"></script>

  <!-- Application Logic -->
  <script src="assets/app.js"></script>
</body>

</html>
